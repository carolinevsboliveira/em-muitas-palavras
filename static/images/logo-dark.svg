<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 40" width="220" height="40">
  <defs>
    <style>
      .logo-book { fill: none; stroke: #f472b6; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
      .logo-spine { fill: #f472b6; }
      .logo-text-main { font-family: Georgia, serif; font-size: 15px; font-weight: 700; fill: #f5f5f5; letter-spacing: 0.02em; }
      .logo-text-sub { font-family: Georgia, serif; font-size: 7.5px; font-style: italic; fill: #f472b6; letter-spacing: 0.12em; }
    </style>
  </defs>

  <!-- Livro aberto -->
  <path class="logo-book" d="M4 8 C4 8 14 10 20 12 L20 34 C14 32 4 30 4 30 Z"/>
  <path class="logo-book" d="M36 8 C36 8 26 10 20 12 L20 34 C26 32 36 30 36 30 Z"/>
  <rect class="logo-spine" x="19.2" y="11" width="1.6" height="23" rx="0.5"/>
  <line x1="7" y1="16" x2="17" y2="17.2" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="7" y1="20" x2="17" y2="21" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="7" y1="24" x2="17" y2="24.8" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="23" y1="17.2" x2="33" y2="16" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="23" y1="21" x2="33" y2="20" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>
  <line x1="23" y1="24.8" x2="33" y2="24" stroke="#f472b6" stroke-width="1" stroke-linecap="round" opacity="0.35"/>

  <text x="44" y="24" class="logo-text-main">em muitas palavras</text>
  <text x="45" y="34" class="logo-text-sub">resenhas por uma simples leitora</text>
