<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      .fv-bg   { fill: #111111; }
      .fv-book { fill: none; stroke: #f472b6; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
      .fv-spine{ fill: #f472b6; }
      .fv-line { stroke: #f472b6; stroke-width: 0.9; stroke-linecap: round; opacity: 0.5; }
    </style>
  </defs>

  <!-- Fundo arredondado -->
  <rect class="fv-bg" width="32" height="32" rx="7"/>

  <!-- Livro aberto centralizado -->
  <!-- Página esquerda -->
  <path class="fv-book" d="M3 7 C3 7 12 9 16 11 L16 27 C12 25 3 23 3 23 Z"/>
  <!-- Página direita -->
  <path class="fv-book" d="M29 7 C29 7 20 9 16 11 L16 27 C20 25 29 23 29 23 Z"/>
  <!-- Lombada -->
  <rect class="fv-spine" x="15.3" y="10.5" width="1.4" height="17" rx="0.4"/>

  <!-- Linhas página esquerda -->
  <line class="fv-line" x1="5.5" y1="14" x2="13.5" y2="15.2"/>
  <line class="fv-line" x1="5.5" y1="18" x2="13.5" y2="18.8"/>
  <line class="fv-line" x1="5.5" y1="22" x2="13.5" y2="22.4"/>

  <!-- Linhas página direita -->
  <line class="fv-line" x1="18.5" y1="15.2" x2="26.5" y2="14"/>
  <line class="fv-line" x1="18.5" y1="18.8" x2="26.5" y2="18"/>
  <line class="fv-line" x1="18.5" y1="22.4" x2="26.5" y2="22"/>
</svg>
