# Hugo configuration file
title: Entre Páginas
defaultContentLanguage: pt
languageCode: pt

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Contact ↗
      url: "https://github.com/imfing"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/imfing/hextra-starter-template"
      params:
        icon: github
    - name: Theme
      weight: 6
      params:
        type: theme-toggle
params:
  description: "Um espaço entre livros, palavras e pensamentos."
  imageZoom:
    enable: true
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      link: /
      width: 176
      height: 32

  footer:
    enable: false

  theme:
    default: dark
    displayToggle: true

  page:
    width: normal

  editURL:
    enable: true
    base: "https://github.com/imfing/hextra-starter-template/edit/main/content"
