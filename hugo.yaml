# Hugo configuration file
baseURL: "https://emmuitaspalavras.carolineoliveira.me/"
title: Entre muitas palavras
defaultContentLanguage: pt
languageCode: pt

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  # allow raw html
  goldmark:
    renderer:
      unsafe: true

  # enable hextra syntax highlight
  highlight:
    noClasses: false
page:
    contextMenu:
      enable: true
menu:
  main:
    - name: Resenhas
      pageRef: /resenhas
      weight: 1
    - name: Livros Lidos
      pageRef: /listas/lidos/
      weight: 2
    - name: Sobre
      pageRef: /sobre
      weight: 3
    - name: Search
      weight: 3
      params:
        type: search
    - name: GitHub
      weight: 4
      url: "https://github.com/carolinevsboliveira/em-muitas-palavras"
      params:
        icon: github
    - name: Linkedin
      weight: 5
      url: "https://www.linkedin.com/in/caroline-s-b-oliveira/"
      params:
        icon: linkedin
    - name: Theme
      weight: 6
      params:
        type: theme-toggle
params:
  description: "Um espaço entre livros, palavras e pensamentos."
  imageZoom:
    enable: true
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.svg
      dark: images/logo-dark.svg
      link: /
      width: 176
      height: 32

  footer:
    enable: false

  theme:
    default: dark
    displayToggle: true

  page:
    width: normal

  editURL:
    enable: false